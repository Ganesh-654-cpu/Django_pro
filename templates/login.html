 {% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

    {% include 'nav.html' %}

    <h1>Login Form</h1>
<form action="{% url 'logincheck' %}" method="POST">
    {% csrf_token %}

    <input type="email" name="email" placeholder="Enter your Email" value="{{ student.email }}">
    <br><br>

    <input type="password" name="password" placeholder="Enter your Password"value="{{ student.password }}">
    <br><br>

    <button type="submit" class="btn btn-primary">
        Login
    </button>
</form>
   
</body>
</html>
