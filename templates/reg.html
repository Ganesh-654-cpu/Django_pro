<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

{% include "nav.html" %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <form action="/saveform/" method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <fieldset class="border p-4 shadow">
                    <legend class="w-auto px-2">Registration Form</legend>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter Full Name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter Email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="tel" name="mobile" class="form-control" placeholder="Enter Mobile Number" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" name="dob" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Gender</label><br>

                        <input type="radio" name="gender" value="Male"> Male
                        <input type="radio" name="gender" value="Female"> Female
                        <input type="radio" name="gender" value="Other"> Other
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea name="address" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Upload Photo</label>
                        <input type="file" name="photo" class="form-control">
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-success">
                            Register
                        </button>

                        <button type="reset" class="btn btn-danger">
                            Reset
                        </button>
                    </div>

                </fieldset>
            </form>

        </div>
    </div>
</div>

</body>
</html>
